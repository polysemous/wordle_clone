name: Deploy to Cloud Run

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY }}
  FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Configure Docker
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
      - name: Build and push image
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
      - name: Deploy private service
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
        run: |
          PROJECT_NUMBER="$(gcloud projects describe "$PROJECT_ID" --format='value(projectNumber)')"
          IAP_AUDIENCE="/projects/${PROJECT_NUMBER}/locations/${REGION}/services/${SERVICE}"
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --port 8080 \
            --service-account "${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}" \
            --no-allow-unauthenticated \
            --iap \
            --min-instances 0 \
            --max-instances 1 \
            --max 1 \
            --concurrency 20 \
            --cpu 1 \
            --memory 512Mi \
            --timeout 60s \
            --cpu-throttling \
            --no-cpu-boost \
            --set-env-vars "DATA_BACKEND=firestore,FIRESTORE_DATABASE_ID=${FIRESTORE_DATABASE_ID},PUZZLE_TIME_ZONE=America/New_York,PUZZLE_EPOCH=2026-01-01,IAP_AUDIENCE=${IAP_AUDIENCE}" \
            --set-secrets "PUZZLE_SEED=wordle-puzzle-seed:latest" \
            --quiet
          gcloud run services add-iam-policy-binding "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --member "serviceAccount:service-${PROJECT_NUMBER}@gcp-sa-iap.iam.gserviceaccount.com" \
            --role roles/run.invoker \
            --quiet
